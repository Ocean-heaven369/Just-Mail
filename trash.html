<!DOCTYPE html>
<html>
<head>
    <title>Trash - Just Mail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>📧 Just Mail</h2>
    <a href="inbox.html">Inbox</a>
    <a href="sent.html">Sent</a>
    <a href="drafts.html">Drafts</a>
    <a href="trash.html">Trash</a>
    <a href="compose.html">Compose</a>
    <a href="contacts.html">Contacts</a>
    <a href="#" id="logout-link">Logout</a>
</div>

<div class="content">
    <h2>Trash</h2>
    <div id="trashList"></div>
</div>

<script type="module">
    import * as api from "./js/api.js";
    import { showToast } from "./js/ui.js";

    if (!api.isLoggedIn()) api.logout();

    const trashList = document.getElementById("trashList");

    async function loadTrash() {
        trashList.innerHTML = '<div style="text-align:center;padding:60px;">Loading trash...</div>';

        try {
            // You need to add getTrash() to api.js first (see below)
            const items = await api.getTrash();

            trashList.innerHTML = items.length === 0
                ? '<p style="text-align:center;padding:40px;">Trash is empty 🗑️</p>'
                : '';

            items.forEach(item => {
                const div = document.createElement("div");
                div.className = "mail";
                div.innerHTML = `
                    <h3>${item.subject || "(No subject)"}</h3>
                    <small>
                        ${item.sender ? `From: ${item.sender}` : `To: ${item.receiver}`}
                        | ${new Date(item.timestamp).toLocaleString()}
                    </small>
                    <p style="margin-top:8px;">${item.message.substring(0, 100)}${item.message.length > 100 ? '...' : ''}</p>
                    <button class="restore-btn" data-id="${item.id}">Restore</button>
                `;
                trashList.appendChild(div);

                div.querySelector(".restore-btn").addEventListener("click", async () => {
                    try {
                        await api.restoreFromTrash(item.id);
                        div.remove();
                        showToast("Email restored", "success");
                    } catch (err) {
                        showToast("Restore failed", "error");
                    }
                });
            });
        } catch (err) {
            trashList.innerHTML = '<p style="color:#e74c3c;text-align:center;">Failed to load trash</p>';
            showToast("Error loading trash", "error");
        }
    }

    document.getElementById("logout-link").addEventListener("click", e => {
        e.preventDefault();
        api.logout();
    });

    loadTrash();
</script>
</body>
</html>
