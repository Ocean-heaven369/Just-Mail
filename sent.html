<!DOCTYPE html>
<html>
<head>
    <title>Just Mail - Sent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>📧 Just Mail</h2>
    <a href="inbox.html">Inbox</a>
    <a href="sent.html">Sent</a>
    <a href="compose.html">Compose</a>
    <a href="contacts.html">Contacts</a>
    <a href="#" id="logout-link">Logout</a>
</div>

<div class="content">
    <h2>Sent Mails</h2>
    <div id="sentList"></div>
</div>

<script type="module">
    import * as api from "./js/api.js";
    import { showToast } from "./js/ui.js";

    if (!api.isLoggedIn()) {
        api.logout();
    }

    const sentList = document.getElementById("sentList");

    async function loadSent() {
        sentList.innerHTML = '<div style="text-align:center; padding:60px;">Loading sent items...</div>';

        try {
            const mails = await api.getSent(1, 20);   // page 1, 20 items

            sentList.innerHTML = "";

            if (mails.length === 0) {
                sentList.innerHTML = '<p style="text-align:center; padding:40px;">No sent mails yet 📤</p>';
                return;
            }

            mails.forEach(mail => {
                const div = document.createElement("div");
                div.className = "mail";
                div.innerHTML = `
                    <h3>${mail.subject || "(No subject)"}</h3>
                    <small><strong>To:</strong> ${mail.receiver} | ${new Date(mail.timestamp).toLocaleString()}</small>
                    <p style="margin-top:12px;">${mail.message}</p>
                `;
                sentList.appendChild(div);
            });
        } catch (err) {
            console.error(err);
            sentList.innerHTML = `
                <div style="color:#e74c3c; text-align:center; padding:60px;">
                    <h3>Could not load sent mails</h3>
                    <p>${err.message || "Network or server error"}</p>
                </div>
            `;
            showToast("Failed to load sent items", "error");
        }
    }

    // Logout handler
    document.getElementById("logout-link").addEventListener("click", e => {
        e.preventDefault();
        api.logout();
    });

    // Initial load
    loadSent();
</script>

</body>
</html>
