<!DOCTYPE html>
<html>
<head>
    <title>Just Mail - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <h1>📧 Just Mail</h1>

    <a href="index.html">Login</a>
</div>

<script src="script.js"></script>
</body>
</html>
